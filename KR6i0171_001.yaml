body:
  text: 劉宋天竺三藏求那跋陀羅譯佛言有一長者名為樹提伽倉庫盈溢金銀具足奴婢成行無所乏少有一白㲲手巾挂著池邊遇天風起吹王殿前王即大會群臣坐共參論羅列卜問怪其所以諸臣皆言國欲將興天賜白㲲唯樹提伽默然不言王語樹提伽諸臣皆喜卿亦無言樹提伽答言不敢欺王是臣之家拭涕之巾挂著池邊遇天風起吹王殿前以是之故默然不言却後數日有九色之華大如車輪遇天風起吹王殿前王大會群臣坐共參論羅列卜問怪其所以諸臣皆言國欲將興天賜金華樹提伽默然不言王語樹提伽諸臣皆喜卿亦無言提伽答言不敢欺王是臣之家後園之中萎落之華遇天風起吹王殿前以是之故默然不言王語樹提伽卿家乃爾命卿約敕家中廣作調度朕須還歸將領二十萬衆到卿家看提伽答言願王共臣相隨臣家自然床褥不須人敷自然飲食不須人作自然擎來不須呼喚自然擎去不須反顧王將領二十萬衆到樹提伽南門直入閣中有一童子顏容端正肉色豐悅甚復可愛王語樹提伽是卿家兒郎以不答言臣不敢欺王是臣之家守閣之奴小復前進至內閣有一童女顏容端正肉色豐悅甚復可愛王語樹提伽卿家女婦以不答言臣不敢欺王是臣之家守閣之婢小復前進至樹提伽堂前白銀為壁水精為地王見謂呼水流疑不得前樹提伽即導王前以入將王企金床踞玉機樹提伽婦一百二十重金銀幃帳裏出為王設拜眼中淚出王語樹提伽卿婦為我設拜有何不眼中淚出答言臣不敢欺王聞王煙氣以是之故眼中淚出王言庶民然脂諸侯然蠟天子然漆亦無煙氣何得淚出樹提伽言臣不敢欺王臣家有一明月神珠挂著殿堂無晝無夜不須火光王是煙中之王是故聞氣耳樹提伽堂前有一十二重高樓將王上視東望西視南望北瞻黯黯惱惱已經一月大臣白王國計事大事須還歸料理人民王謂須臾小復可忍樹提伽復將王後園之中看流泉浴池各皆可美甚復可愛黯黯惱惱已經一月大臣白王國計事大事須還歸料理人民王謂呼須臾小復可忍樹提伽七寶布施綾羅繒綵二十萬衆人馬車乘一時還國王即大會群臣共坐參論羅列卜問怪其所以樹提伽是我之民婦女宅舍過甚於我我欲伐之可取以不諸臣皆言宜可取之王將領四十萬衆椎鐘鳴鼓圍樹提伽舍數百餘重樹提伽門中一力士手捉金杵一擬四十萬衆人馬俱倒手腳繚戾腰髖妸婆狀似醉容頭腳跛𨁟不復得起樹提伽乘雲之車在虛空中來問諸人來時何意臥地不起大王遣來欲伐長者門中有一力士手捉金杵一擬令四十萬衆人馬俱倒繚戾腰髖妸婆狀似醉容頭腳跛𨁟不復得起樹提伽問諸人欲得起不諸人皆言欲得起樹提伽舉一神杖令四十萬衆人馬俱起還國王即遣使喚樹提伽我共同車而載往詣佛所問言世尊樹提伽是我之臣前身有何功德女婦宅舍過甚於我佛言樹提伽五百商主將諸商人齎持重寶經過險路于時深山之中見一病道人給其庵屋厚敷床褥給其水漿鎢錥米糧給其燈燭于時乞願願得天堂之供今得果報于時布施者是誰樹提伽是也病道人者我身是也五百商主人皆得阿羅漢道也佛説經竟王及諸臣發阿耨多羅三藐三菩提心禮佛即退
